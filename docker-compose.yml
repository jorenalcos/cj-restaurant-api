version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: cj_postgres

    restart: always

    environment:
      POSTGRES_DB: cj_restaurant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5433"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: